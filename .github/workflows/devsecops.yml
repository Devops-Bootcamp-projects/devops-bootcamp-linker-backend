# -------------------------------------------------
# PIPELINE NAME: Backend DevSecOps Pipeline
# -------------------------------------------------

# -------------------------------------------------
# TRIGGERS
# -------------------------------------------------
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# -------------------------------------------------
# GLOBAL VARIABLES
# -------------------------------------------------
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: devopsbootcamp-backend
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
# -------------------------------------------------
# JOB 1: Notify Slack that pipeline started
# -------------------------------------------------
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: '#3273DC'
          SLACK_MESSAGE: "🚀 Backend Build Started | Run #${{ github.run_number }} | Commit: ${{ github.sha }}"
          SLACK_TITLE: Pipeline Initialized
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}

# -------------------------------------------------
# JOB 2: Build, Scan and Push Docker Image
# -------------------------------------------------
  build-scan-push:
    needs: notify-start
    runs-on: ubuntu-latest
    steps:
# -------------------------------------------------
# STEP 1: Checkout Repository
# -------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

# -------------------------------------------------
# STEP 2: Install Node.js and pnpm
# -------------------------------------------------
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

# -------------------------------------------------
# STEP 3: Install Dependencies
# -------------------------------------------------
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile


# -------------------------------------------------
# STEP 4: Setup Docker Buildx
# -------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

# -------------------------------------------------
# STEP 5: Login to Docker Hub
# -------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# -------------------------------------------------
# STEP 6: Generate Image Tag (Commit SHA)
# -------------------------------------------------
      - name: Generate Automated Version and Tag
        id: vars
        run: |
          VERSION_MINOR=$((0 + ${{ github.run_number }}))
          echo "tag=1.${VERSION_MINOR}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

# -------------------------------------------------
# STEP 7: Build Docker Image
# -------------------------------------------------
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:test

# -------------------------------------------------
# STEP 8: Scan Docker Image for Vulnerabilities
# -------------------------------------------------
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:test'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-report.txt'

# -------------------------------------------------
# STEP 9: Upload Scan Report
# -------------------------------------------------
      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-trivy-report
          path: trivy-report.txt

# -------------------------------------------------
# STEP 10: Push Docker Image to Docker Hub
# -------------------------------------------------
      - name: Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.sha_short }}

# -------------------------------------------------
# STEP 11: Final Slack Notification
# -------------------------------------------------
      - name: Send Final Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Backend Build Result: ${{ job.status }} | Tag: ${{ steps.vars.outputs.tag }}"
          SLACK_TITLE: Pipeline Complete
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}