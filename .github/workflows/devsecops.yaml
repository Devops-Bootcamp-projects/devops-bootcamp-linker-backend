name: Backend DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'

jobs:

# -----------------------------------------
# Notify Start
# -----------------------------------------
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: |
            🚀 Backend PR triggered by ${{ github.actor }}

            PR: ${{ github.event.pull_request.html_url }}
            Branch: ${{ github.head_ref }}
            Title: ${{ github.event.pull_request.title }}
          SLACK_TITLE: Backend DevSecOps Pipeline

# -----------------------------------------
# LINT
# -----------------------------------------
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        run: pnpm run lint

# -----------------------------------------
# SCA (Dependency Scan)
# -----------------------------------------
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run pnpm audit
        run: |
          pnpm audit --json > npm-audit-report.json || true

      - name: Enforce vulnerability policy
        run: |
          CRITICAL=$(grep -o '"critical":[0-9]*' npm-audit-report.json | grep -o '[0-9]*' || echo 0)
          HIGH=$(grep -o '"high":[0-9]*' npm-audit-report.json | grep -o '[0-9]*' || echo 0)

          echo "CRITICAL: $CRITICAL"
          echo "HIGH: $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Vulnerabilities found"
            exit 1
          else
            echo "✅ No high/critical vulnerabilities"
          fi

      - name: Upload SCA Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: npm-audit-report.json

# -----------------------------------------
# SAST (Semgrep)
# -----------------------------------------
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --error --json-output=semgrep-results.json
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-results.json

      - name: Slack Notification (Failure)
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: danger
          SLACK_MESSAGE: "❌ Backend SAST failed"

      - name: Slack Notification (Success)
        if: ${{ success() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: good
          SLACK_MESSAGE: "✅ Backend SAST passed"

      - name: Slack Report Link
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            📊 DevSecOps Reports:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

# -----------------------------------------
# Final Notification
# -----------------------------------------
  notify-final:
    needs: [lint, sca, sast]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Final Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_MESSAGE: |
            Backend DevSecOps Pipeline: ${{ job.status }}

            View reports:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}